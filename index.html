<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>開發日誌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span class="sidebar-title">EXPLORER</span>
        <span class="sidebar-subtitle">開發日誌</span>
      </div>
      <div id="sidebar-section-label">ENTRIES</div>
      <nav id="file-list" aria-label="Log files"></nav>
    </aside>

    <div id="resize-handle" title="Drag to resize"></div>

    <main id="content">
      <div id="breadcrumb">
        <button id="menu-toggle">[MENU]</button>
        <span class="breadcrumb-prefix">logs /</span>
        <span id="current-file">—</span>
      </div>
      <div id="log-body">
        <div id="welcome">
          <p class="welcome-line">$ devlog --start</p>
          <p class="welcome-line">Initializing 開發日誌<span class="cursor">█</span></p>
          <p class="welcome-line muted">Select an entry from the sidebar to begin.</p>
        </div>
      </div>
    </main>
  </div>

  <footer id="status-bar">
    <span id="status-branch">⎇ devlog</span>
    <span id="status-index" class="status-muted">Loading index…</span>
    <span class="status-spacer"></span>
    <span id="status-file" class="status-muted">No file open</span>
    <span id="status-lines" class="status-muted"></span>
  </footer>

  <div id="sidebar-backdrop"></div>
  <script src="app.js"></script>
</body>
</html>
